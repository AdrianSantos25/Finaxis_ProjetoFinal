name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check deploy secrets
        id: deploy_config
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_APP_PATH: ${{ secrets.DEPLOY_APP_PATH }}
        run: |
          if [ -n "$DEPLOY_HOST" ] && [ -n "$DEPLOY_USER" ] && [ -n "$DEPLOY_SSH_KEY" ] && [ -n "$DEPLOY_APP_PATH" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy via SSH (optional)
        if: steps.deploy_config.outputs.enabled == 'true'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_APP_PATH }}
            git fetch --all
            git reset --hard origin/main
            npm ci --omit=dev
            npm run check
            pm2 restart finaxis || pm2 start src/app.js --name finaxis

      - name: Skip deploy when secrets are missing
        if: steps.deploy_config.outputs.enabled != 'true'
        run: 'echo "Deploy skipped: configure DEPLOY_* secrets in GitHub Actions."'
